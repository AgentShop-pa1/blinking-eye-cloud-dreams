<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinking Eye - Cloud Dreams</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;700&family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="cloud-bg">
            <div class="cloud cloud1"></div>
            <div class="cloud cloud2"></div>
            <div class="cloud cloud3"></div>
        </div>
        
        <div class="content">
            <h1 class="title">Cloud Dreams</h1>
            <p class="subtitle">A gentle eye watching over ethereal skies</p>
            
            <div class="eye-container">
                <div class="eye">
                    <div class="eyeball">
                        <div class="iris">
                            <div class="pupil">
                                <div class="highlight"></div>
                            </div>
                        </div>
                    </div>
                    <div class="eyelid top"></div>
                    <div class="eyelid bottom"></div>
                    <div class="lashes top-lashes">
                        <div class="lash"></div>
                        <div class="lash"></div>
                        <div class="lash"></div>
                        <div class="lash"></div>
                        <div class="lash"></div>
                    </div>
                    <div class="lashes bottom-lashes">
                        <div class="lash"></div>
                        <div class="lash"></div>
                        <div class="lash"></div>
                    </div>
                </div>
            </div>
            
            <div class="footer">
                <p>Dreamy & Peaceful</p>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
